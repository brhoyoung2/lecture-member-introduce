<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>투닝 교원연수 강사진 · Tooning</title>
<meta name="description" content="tooning.io 기반 AI 웹툰·콘텐츠 제작 교원연수를 이끄는 강사진 소개" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --bg:#ffffff;
    --bg-soft:#f7f6fb;
    --ink:#191630;
    --ink-2:#494360;
    --muted:#8c87a3;
    --line:#eae6f4;
    --line-2:#f0edf8;
    --violet:#6b4eff;
    --violet-ink:#4733c9;
    --lav:#efebff;
    --lav-2:#f6f3ff;
    --white:#ffffff;
    --shadow:0 1px 2px rgba(25,22,48,.04), 0 12px 32px rgba(25,22,48,.06);
    --shadow-lift:0 2px 6px rgba(25,22,48,.06), 0 22px 48px rgba(80,60,200,.14);
    --r:18px;
    --mono:'SFMono-Regular',ui-monospace,'JetBrains Mono','Menlo',monospace;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.6;
  }
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--lav);color:var(--violet-ink);}

  /* ---------- Header ---------- */
  header.bar{
    position:fixed;top:0;left:0;right:0;z-index:50;
    background:transparent;border-bottom:1px solid transparent;
    transition:background .3s,border-color .3s,box-shadow .3s;
  }
  header.bar.solid{
    background:rgba(255,255,255,.86);
    backdrop-filter:saturate(160%) blur(12px);
    border-bottom:1px solid var(--line);
  }
  /* transparent header sitting over the hero video */
  header.bar:not(.solid) .brand b,
  header.bar:not(.solid) .brand .sub{color:#fff;}
  header.bar:not(.solid) .brand .div{color:rgba(255,255,255,.38);}
  header.bar:not(.solid) .btn{
    color:#fff;border-color:rgba(255,255,255,.42);
    background:rgba(255,255,255,.10);backdrop-filter:blur(6px);
  }
  header.bar:not(.solid) .btn:hover{background:rgba(255,255,255,.20);border-color:rgba(255,255,255,.7);}
  header.bar:not(.solid) .btn.primary{background:var(--violet);border-color:var(--violet);}
  .bar-in{
    max-width:1120px;margin:0 auto;padding:14px 28px;
    display:flex;align-items:center;gap:14px;
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.02em;}
  .brand .logo{
    width:30px;height:30px;border-radius:9px;
    background:linear-gradient(135deg,var(--violet),#9b6bff);
    display:grid;place-items:center;color:#fff;font-weight:900;font-size:15px;
    box-shadow:0 4px 12px rgba(107,78,255,.35);
  }
  .brand b{font-size:17px;}
  .brand .div{color:var(--line);font-weight:400;}
  .brand .sub{font-size:14px;color:var(--ink-2);font-weight:600;}
  .bar-spacer{flex:1;}
  .btn{
    font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;
    border:1px solid var(--line);background:var(--white);color:var(--ink);
    padding:9px 15px;border-radius:11px;transition:.18s;display:inline-flex;align-items:center;gap:7px;
  }
  .btn:hover{border-color:#d8d2ec;transform:translateY(-1px);}
  .btn.primary{background:var(--violet);border-color:var(--violet);color:#fff;box-shadow:0 6px 16px rgba(107,78,255,.32);}
  .btn.primary:hover{background:var(--violet-ink);}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--muted);}
  .btn.ghost:hover{color:var(--ink);background:var(--bg-soft);}
  .btn.danger{color:#d23c5b;border-color:#f4d5dc;background:#fff;}
  .btn.danger:hover{background:#fff3f5;border-color:#eeb9c4;}
  .btn svg{width:15px;height:15px;}

  /* ---------- Hero (full-screen video) ---------- */
  .hero{
    position:relative;min-height:100vh;min-height:100svh;
    display:flex;flex-direction:column;justify-content:center;
    overflow:hidden;color:#fff;margin:0;max-width:none;
  }
  .hero-video{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;z-index:0;background:#0c0a1c;
  }
  .hero-scrim{
    position:absolute;inset:0;z-index:1;pointer-events:none;
    background:
      radial-gradient(78% 56% at 50% 50%,rgba(12,10,28,.64) 0%,rgba(12,10,28,.28) 55%,rgba(12,10,28,0) 100%),
      linear-gradient(180deg,
        rgba(12,10,28,.80) 0%,
        rgba(12,10,28,.30) 24%,
        rgba(12,10,28,.20) 60%,
        rgba(12,10,28,.88) 100%);
  }
  .hero-inner{
    position:relative;z-index:2;width:100%;max-width:1120px;
    margin:0 auto;padding:40px 28px;text-align:center;
  }
  .eyebrow{
    font-family:var(--mono);font-size:12.5px;letter-spacing:.18em;text-transform:uppercase;
    color:rgba(255,255,255,.86);font-weight:600;margin:0 0 18px;
  }
  .hero h1{
    font-size:clamp(32px,5vw,58px);line-height:1.12;letter-spacing:-.03em;
    font-weight:800;margin:0 auto;max-width:20ch;word-break:keep-all;
    text-shadow:0 2px 30px rgba(0,0,0,.35);
  }
  .hero h1 .hl{
    background:linear-gradient(180deg,transparent 60%,rgba(107,78,255,.6) 60%);
    padding:0 .06em;
  }
  .hero p.lead{
    margin:22px auto 0;font-size:17px;color:rgba(255,255,255,.84);max-width:56ch;line-height:1.7;
    text-shadow:0 1px 16px rgba(0,0,0,.3);
  }
  .hero-meta{
    display:flex;gap:40px;margin-top:38px;flex-wrap:wrap;justify-content:center;
  }
  .hero-cta{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    margin-top:36px;padding:16px 36px;border-radius:999px;
    background:var(--violet);color:#fff;font-weight:800;font-size:16px;letter-spacing:-.01em;
    box-shadow:0 12px 32px rgba(107,78,255,.5);
    transition:transform .2s,box-shadow .2s,background .2s;
  }
  .hero-cta:hover{
    background:var(--violet-ink);transform:translateY(-2px);
    box-shadow:0 18px 40px rgba(107,78,255,.6);
  }
  .hero-cta:active{transform:translateY(0);}
  .hero-meta .stat{display:flex;flex-direction:column;}
  .hero-meta .stat .n{font-size:26px;font-weight:800;letter-spacing:-.02em;}
  .hero-meta .stat .l{font-size:13px;color:rgba(255,255,255,.62);font-weight:600;margin-top:2px;}
  .hero-meta .stat .n .u{font-size:15px;color:#b6a4ff;margin-left:2px;}
  .hero-cue{
    position:absolute;left:50%;bottom:24px;transform:translateX(-50%);z-index:2;
    display:flex;flex-direction:column;align-items:center;gap:9px;pointer-events:none;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.28em;color:rgba(255,255,255,.6);
  }
  .hero-cue::after{
    content:"";width:1px;height:36px;transform-origin:top;
    background:linear-gradient(rgba(255,255,255,.7),transparent);
    animation:cuePulse 2.1s ease-in-out infinite;
  }
  @keyframes cuePulse{0%,100%{opacity:.25;transform:scaleY(.6);}50%{opacity:1;transform:scaleY(1);}}

  /* ---------- Section ---------- */
  .wrap{max-width:1120px;margin:0 auto;padding:0 28px;}
  .sec-head{display:flex;align-items:baseline;gap:14px;margin:46px 0 22px;scroll-margin-top:84px;}
  .wrap>.sec-head:first-of-type{margin-top:66px;}
  #detail{scroll-margin-top:84px;}
  .sec-head h2{font-size:20px;font-weight:800;letter-spacing:-.02em;margin:0;}
  .sec-head .count{font-family:var(--mono);font-size:13px;color:var(--muted);}
  .sec-head .line{flex:1;height:1px;background:var(--line);}

  /* ---------- Roster ---------- */
  .roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:18px;}
  .card{
    position:relative;background:var(--white);border:1px solid var(--line);
    border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.2s;box-shadow:var(--shadow);
    display:flex;flex-direction:column;
  }
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lift);border-color:#d9d2f4;}
  .card.active{border-color:var(--violet);box-shadow:0 0 0 2px var(--violet), var(--shadow-lift);}
  .card .ph{aspect-ratio:1/1;width:100%;background:var(--lav-2);overflow:hidden;position:relative;}
  .card .ph img{width:100%;height:100%;object-fit:cover;display:block;}
  .card .ph.empty{display:grid;place-items:center;color:var(--violet);font-weight:800;font-size:42px;}
  .card .body{padding:16px 17px 18px;}
  .card .nm{font-size:18px;font-weight:800;letter-spacing:-.02em;}
  .card .rl{font-size:13px;color:var(--ink-2);margin-top:3px;line-height:1.45;min-height:19px;}
  .card .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
  .pill{font-size:12px;font-weight:600;color:var(--violet-ink);background:var(--lav);padding:4px 9px;border-radius:999px;}
  .card .open-cue{
    position:absolute;top:12px;right:12px;background:rgba(255,255,255,.92);
    border:1px solid var(--line);border-radius:9px;width:30px;height:30px;display:grid;place-items:center;
    color:var(--ink-2);opacity:0;transition:.2s;
  }
  .card:hover .open-cue{opacity:1;}
  .card.active .open-cue{opacity:1;background:var(--violet);border-color:var(--violet);color:#fff;}

  .add-card{
    border:1.5px dashed #cfc7ee;background:var(--lav-2);border-radius:var(--r);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    color:var(--violet-ink);font-weight:700;cursor:pointer;min-height:200px;transition:.18s;
  }
  .add-card:hover{background:var(--lav);border-color:var(--violet);}
  .add-card .plus{width:42px;height:42px;border-radius:13px;background:var(--white);display:grid;place-items:center;font-size:24px;box-shadow:var(--shadow);}

  /* ---------- Detail ---------- */
  .detail{margin:18px 0 12px;}
  .profile{
    display:grid;grid-template-columns:332px 1fr;gap:38px;
    background:var(--white);border:1px solid var(--line);border-radius:24px;
    padding:30px;box-shadow:var(--shadow);
  }
  .pf-left{position:sticky;top:84px;align-self:start;}
  .pf-photo{
    width:100%;aspect-ratio:1/1;border-radius:18px;overflow:hidden;background:var(--lav-2);
    position:relative;
  }
  .pf-photo img{width:100%;height:100%;object-fit:cover;display:block;}
  .pf-photo.empty{display:grid;place-items:center;color:var(--violet);font-weight:800;font-size:64px;}
  .photo-edit{
    position:absolute;inset:0;background:rgba(25,22,48,.55);color:#fff;
    display:none;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:14px;cursor:pointer;
  }
  .photo-edit svg{width:18px;height:18px;}
  body.edit .pf-photo .photo-edit{display:flex;opacity:0;transition:.18s;}
  body.edit .pf-photo:hover .photo-edit{opacity:1;}
  .pf-name{font-size:26px;font-weight:800;letter-spacing:-.03em;margin:20px 0 0;}
  .pf-role{font-size:14.5px;color:var(--ink-2);margin-top:6px;line-height:1.5;}
  .pf-tagline{
    margin-top:18px;font-family:var(--mono);font-size:13px;color:var(--violet);
    border-left:2px solid var(--violet);padding-left:12px;letter-spacing:.01em;
  }
  .pf-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:18px;}

  .pf-right{min-width:0;}
  .block{margin-bottom:34px;}
  .block:last-child{margin-bottom:0;}
  .block-h{display:flex;align-items:center;gap:9px;margin:0 0 16px;}
  .block-h .ix{font-family:var(--mono);font-size:12px;color:var(--violet);font-weight:600;}
  .block-h h3{font-size:16px;font-weight:800;letter-spacing:-.02em;margin:0;}
  .greeting{font-size:15.5px;color:var(--ink-2);line-height:1.8;white-space:pre-wrap;}

  /* timeline */
  .tl{position:relative;margin-left:6px;}
  .tl::before{content:"";position:absolute;left:0;top:6px;bottom:6px;width:2px;background:var(--line);}
  .tl-row{position:relative;padding:0 0 18px 26px;display:flex;flex-direction:column;}
  .tl-row:last-child{padding-bottom:0;}
  .tl-row::before{
    content:"";position:absolute;left:-4px;top:6px;width:10px;height:10px;border-radius:50%;
    background:var(--white);border:2px solid var(--violet);
  }
  .tl-row.recent::before{background:var(--violet);box-shadow:0 0 0 4px var(--lav);}
  .tl-period{font-family:var(--mono);font-size:12.5px;color:var(--muted);letter-spacing:-.01em;}
  .tl-role{font-size:15px;font-weight:600;color:var(--ink);margin-top:1px;}

  /* lectures */
  .lec{display:grid;grid-template-columns:repeat(2,1fr);gap:10px 22px;}
  .lec-item{display:flex;gap:10px;align-items:baseline;font-size:14.5px;color:var(--ink-2);}
  .lec-item .yr{font-family:var(--mono);font-size:12px;color:var(--violet);font-weight:600;flex:none;min-width:30px;}
  .lec-item .tx{color:var(--ink);}

  /* ---------- Edit affordances ---------- */
  [contenteditable="true"]{outline:none;border-radius:6px;transition:.12s;}
  body.edit [contenteditable="true"]{
    background:var(--lav-2);box-shadow:inset 0 0 0 1px var(--line);
    padding:2px 7px;margin:-2px -7px;cursor:text;
  }
  body.edit [contenteditable="true"]:focus{background:#fff;box-shadow:inset 0 0 0 2px var(--violet);}
  body.edit [contenteditable="true"]:empty::before{content:attr(data-ph);color:var(--muted);}

  .edit-input{
    font-family:inherit;font-size:14px;color:var(--ink);background:#fff;
    border:1px solid var(--line);border-radius:9px;padding:8px 11px;width:100%;
  }
  .edit-input:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px var(--lav);}
  .edit-input.mono{font-family:var(--mono);}
  .row-edit{display:flex;gap:8px;align-items:center;margin-bottom:9px;}
  .row-edit .grab{color:var(--muted);font-size:14px;flex:none;}
  .icon-btn{
    flex:none;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:#fff;
    cursor:pointer;display:grid;place-items:center;color:#d23c5b;transition:.15s;
  }
  .icon-btn:hover{background:#fff3f5;border-color:#eeb9c4;}
  .icon-btn svg{width:16px;height:16px;}
  .add-row{
    font-family:inherit;font-weight:700;font-size:13px;color:var(--violet-ink);background:var(--lav-2);
    border:1px dashed #cfc7ee;border-radius:10px;padding:9px 14px;cursor:pointer;transition:.15s;margin-top:4px;
  }
  .add-row:hover{background:var(--lav);border-color:var(--violet);}
  .edit-only{display:none;}
  body.edit .edit-only{display:block;}
  body.edit .view-only{display:none;}
  .field-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;display:block;letter-spacing:.01em;}

  .detail-toolbar{
    display:none;margin-bottom:14px;background:var(--lav-2);border:1px solid var(--line);
    border-radius:14px;padding:10px 14px;align-items:center;gap:10px;flex-wrap:wrap;
  }
  body.edit .detail-toolbar{display:flex;}
  .detail-toolbar .lbl{font-size:13px;font-weight:700;color:var(--violet-ink);display:flex;align-items:center;gap:7px;}
  .detail-toolbar .lbl svg{width:15px;height:15px;}

  /* ---------- Apply form ---------- */
  .apply{
    background:var(--bg-soft);border-top:1px solid var(--line);
    margin-top:80px;padding:66px 0 74px;scroll-margin-top:60px;
  }
  .apply-head{text-align:center;max-width:600px;margin:0 auto 34px;}
  .apply-eyebrow{
    font-family:var(--mono);font-size:12px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--violet);font-weight:600;margin:0 0 12px;
  }
  .apply-head h2{font-size:clamp(24px,3.4vw,30px);font-weight:800;letter-spacing:-.03em;margin:0 0 10px;}
  .apply-head p{color:var(--ink-2);font-size:15px;margin:0;line-height:1.65;}
  .apply-form{
    max-width:720px;margin:0 auto;background:var(--white);border:1px solid var(--line);
    border-radius:24px;padding:34px;box-shadow:var(--shadow);
  }
  .f-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 20px;}
  .field{display:flex;flex-direction:column;gap:7px;}
  .field.wide{grid-column:1 / -1;}
  .field>span{font-size:13px;font-weight:700;color:var(--ink-2);}
  .field input{
    font-family:inherit;font-size:15px;color:var(--ink);background:var(--bg-soft);
    border:1px solid var(--line);border-radius:12px;padding:13px 15px;transition:.15s;width:100%;
  }
  .field input:focus{outline:none;background:#fff;border-color:var(--violet);box-shadow:0 0 0 3px var(--lav);}
  .field input::placeholder{color:#b3aec7;}
  .apply-submit{
    width:100%;margin-top:26px;padding:16px;border:none;border-radius:999px;
    background:var(--violet);color:#fff;font-family:inherit;font-weight:800;font-size:16px;cursor:pointer;
    box-shadow:0 12px 30px rgba(107,78,255,.4);transition:transform .2s,box-shadow .2s,background .2s;
  }
  .apply-submit:hover{background:var(--violet-ink);transform:translateY(-2px);box-shadow:0 16px 36px rgba(107,78,255,.5);}
  .apply-submit:active{transform:translateY(0);}
  .apply-note{text-align:center;font-size:12.5px;color:var(--muted);margin:14px 0 0;}

  /* ---------- Footer ---------- */
  footer{border-top:1px solid var(--line);margin-top:64px;}
  .ft{max-width:1120px;margin:0 auto;padding:28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;color:var(--muted);font-size:13px;}
  .ft a{color:var(--violet);font-weight:600;}

  /* ---------- Toast ---------- */
  .toast{
    position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 20px;border-radius:12px;font-size:14px;font-weight:600;
    opacity:0;pointer-events:none;transition:.25s;z-index:100;box-shadow:0 12px 30px rgba(0,0,0,.25);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ---------- Modal (password) ---------- */
  .modal-bg{
    position:fixed;inset:0;background:rgba(25,22,48,.34);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:90;padding:20px;
  }
  .modal-bg.show{display:flex;}
  .modal{
    background:#fff;border-radius:20px;padding:28px;width:340px;max-width:100%;box-shadow:0 24px 60px rgba(25,22,48,.3);
    text-align:center;
  }
  .modal .mlogo{width:46px;height:46px;border-radius:13px;background:var(--lav);display:grid;place-items:center;margin:0 auto 14px;color:var(--violet);}
  .modal .mlogo svg{width:24px;height:24px;}
  .modal h3{margin:0 0 6px;font-size:18px;font-weight:800;}
  .modal p{margin:0 0 18px;font-size:13.5px;color:var(--muted);}
  .modal input{
    width:100%;text-align:center;font-size:22px;letter-spacing:.4em;font-family:var(--mono);
    padding:12px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;
  }
  .modal input:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px var(--lav);}
  .modal .err{color:#d23c5b;font-size:12.5px;height:16px;margin-bottom:10px;font-weight:600;}
  .modal .actions{display:flex;gap:9px;}
  .modal .actions .btn{flex:1;justify-content:center;}

  @media (max-width:820px){
    .profile{grid-template-columns:1fr;gap:24px;padding:22px;}
    .pf-left{position:static;}
    .pf-photo{max-width:240px;}
    .lec{grid-template-columns:1fr;}
    .bar-in{padding:12px 18px;}
    .hero-inner{padding:28px 18px;}
    .hero-meta{gap:26px;}
    .wrap{padding:0 18px;}
    .f-grid{grid-template-columns:1fr;}
    .apply-form{padding:22px;}
    .brand .sub{display:none;}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;scroll-behavior:auto!important;}
  }
</style>
</head>
<body>

<header class="bar">
  <div class="bar-in">
    <a href="#top" class="brand">
      <span class="logo">T</span>
      <b>Tooning</b>
      <span class="div">|</span>
      <span class="sub">교원연수 강사진</span>
    </a>
    <span class="bar-spacer"></span>
    <button class="btn" id="editToggle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      수정

const STORAGE_KEY = 'tooning_training_data_v1';
const PASSWORD = '0909';
const clone = o => JSON.parse(JSON.stringify(o));

let state = { data: loadData(), editing:false, selectedId:null };
if(!state.selectedId && state.data.instructors[0]) state.selectedId = state.data.instructors[0].id;

function loadData(){
  try{ const s = localStorage.getItem(STORAGE_KEY); if(s){ const d = JSON.parse(s); if(d && d.instructors) return d; } }catch(e){}
  return clone(DEFAULT_DATA);
}
function persist(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data)); }catch(e){} }
function uid(){ return 'ins_' + Math.random().toString(36).slice(2,8); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function getSelected(){ return state.data.instructors.find(i=>i.id===state.selectedId) || state.data.instructors[0]; }
function splitLecture(s){ const m = (s||'').match(/^\s*('?\d{2,4})\s+(.*)$/); return m ? {yr:m[1], tx:m[2]} : {yr:'', tx:s}; }

/* ---------- Render: hero ---------- */
function renderHero(){
  const m = state.data.meta;
  const ey = document.getElementById('heroEyebrow');
  const ti = document.getElementById('heroTitle');
  const de = document.getElementById('heroDesc');
  ey.textContent = m.heroEyebrow;
  de.textContent = m.heroDesc;
  if(state.editing){
    ti.textContent = m.heroTitle;
  }else{
    // highlight last word group
    ti.innerHTML = esc(m.heroTitle).replace(/\n/g,'<br>');
  }
  document.getElementById('statInstructors').innerHTML = state.data.instructors.length + '<span class="u">명</span>';
}

/* ---------- Render: roster ---------- */
function renderRoster(){
  const r = document.getElementById('roster');
  document.getElementById('rosterCount').textContent = String(state.data.instructors.length).padStart(2,'0');
  r.innerHTML = '';
  state.data.instructors.forEach(ins=>{
    const c = document.createElement('div');
    c.className = 'card' + (ins.id===state.selectedId ? ' active':'');
    const ph = ins.photo
      ? '<div class="ph"><img src="'+ins.photo+'" alt="'+esc(ins.name)+'"></div>'
      : '<div class="ph empty">'+esc((ins.name||'?').slice(0,1))+'</div>';
    const tags = (ins.tags||[]).slice(0,3).map(t=>'<span class="pill">'+esc(t)+'</span>').join('');
    c.innerHTML = ph +
      '<div class="open-cue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></div>' +
      '<div class="body"><div class="nm">'+esc(ins.name||'이름 없음')+'</div>'+
      '<div class="rl">'+esc(ins.role||'')+'</div>'+
      '<div class="tags">'+tags+'</div></div>';
    c.addEventListener('click', ()=>{ state.selectedId = ins.id; render(); document.getElementById('detail').scrollIntoView({behavior:'smooth',block:'start'}); });
    r.appendChild(c);
  });
  if(state.editing){
    const add = document.createElement('div');
    add.className = 'add-card';
    add.innerHTML = '<div class="plus">+</div><span>강사 추가</span>';
    add.addEventListener('click', addInstructor);
    r.appendChild(add);
  }
}

  const ed = state.editing;

    ? '<img src="'+ins.photo+'" alt="'+esc(ins.name)+'">'
    : '';
  const photoCls = 'pf-photo' + (ins.photo?'':' empty');
  const photoInner = (ins.photo?photo:esc((ins.name||'?').slice(0,1))) +
    '<div class="photo-edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>사진 교체</div>';

    )).join('') + '</div><button class="add-row" id="addCareer">+ 경력 추가</button>';

      '<div class="tl-row'+(i===0?' recent':'')+'"><span class="tl-period">'+esc(c.period)+'</span><span class="tl-role">'+esc(c.role)+'</span></div>'
    )).join('') + '</div>';
  }

  // lectures
  let lecHtml;
  if(ed){
    lecHtml = '<div id="lecEdit">'+ (ins.lectures||[]).map((l,i)=>(

        tagsHtml+
      '</div>'+
      '<div class="pf-right">'+rightHtml+'</div>'+
    '</div>';

  bindDetailEvents(ins);
}

function bindDetailEvents(ins){
  // contenteditable meta fields -> write back, no re-render
  document.querySelectorAll('#detail [data-meta]').forEach(el=>{
    el.addEventListener('input', ()=>{ ins[el.dataset.meta] = el.innerText; persist(); });
  });
  // photo replace
  const pf = document.getElementById('pfPhoto');
  if(pf && state.editing){
    pf.addEventListener('click', ()=>{ pendingPhotoTarget = ins; document.getElementById('photoInput').click(); });
  }
  if(!state.editing) return;

  const tagsEl = document.getElementById('ed-tags');
  if(tagsEl) tagsEl.addEventListener('input', ()=>{ ins.tags = tagsEl.value.split(',').map(s=>s.trim()).filter(Boolean); persist(); });

  // career inputs
  document.querySelectorAll('#careerEdit .row-edit').forEach(row=>{
    const i = +row.dataset.i;
    row.querySelectorAll('input').forEach(inp=>{
      inp.addEventListener('input', ()=>{ ins.career[i][inp.dataset.k] = inp.value; persist(); });
    });
  });
  const ac = document.getElementById('addCareer');
  if(ac) ac.addEventListener('click', ()=>{ ins.career.unshift({period:"'YY.MM", role:""}); persist(); renderDetail(); });

  // lecture inputs
  document.querySelectorAll('#lecEdit .row-edit').forEach(row=>{
    const i = +row.dataset.i;
    const inp = row.querySelector('input');
    inp.addEventListener('input', ()=>{ ins.lectures[i] = inp.value; persist(); });
  });
  const al = document.getElementById('addLec');
  if(al) al.addEventListener('click', ()=>{ ins.lectures.push(''); persist(); renderDetail(); const rows=document.querySelectorAll('#lecEdit .row-edit input'); if(rows.length) rows[rows.length-1].focus(); });

  // move buttons
  document.querySelectorAll('#detail [data-move]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const i = +b.dataset.i;
      const dir = b.dataset.move;
      const type = b.dataset.type;
      const target = dir === 'up' ? i-1 : i+1;
      if(target < 0) return;

      if(type === 'career' && ins.career && target < ins.career.length){
        [ins.career[i], ins.career[target]] = [ins.career[target], ins.career[i]];
        persist(); renderDetail();
      }
      if(type === 'lec' && ins.lectures && target < ins.lectures.length){
        [ins.lectures[i], ins.lectures[target]] = [ins.lectures[target], ins.lectures[i]];
        persist(); renderDetail();
      }
    });
  });
  // delete buttons
  document.querySelectorAll('#detail [data-del]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const i = +b.dataset.i;
      if(b.dataset.del==='career') ins.career.splice(i,1);
      else ins.lectures.splice(i,1);
      persist(); renderDetail();
    });
  });
  // delete instructor
  const di = document.getElementById('delInstructor');
  if(di) di.addEventListener('click', ()=>{
    if(state.data.instructors.length<=1){ toast('마지막 강사는 삭제할 수 없습니다'); return; }
    if(!confirm('"'+(ins.name||'이 강사')+'" 프로필을 삭제할까요?')) return;
    state.data.instructors = state.data.instructors.filter(x=>x.id!==ins.id);
    state.selectedId = state.data.instructors[0].id;
    persist(); render(); toast('삭제되었습니다');
  });
}

/* ---------- Photo handling ---------- */
let pendingPhotoTarget = null;
document.getElementById('photoInput').addEventListener('change', function(){
  const file = this.files[0]; this.value='';
  if(!file || !pendingPhotoTarget) return;
  if(file.size > 4*1024*1024){ toast('이미지는 4MB 이하로 올려주세요'); return; }
  const reader = new FileReader();
  reader.onload = e=>{
    // downscale to keep file small
    const img = new Image();
    img.onload = ()=>{
      const max=900, sc=Math.min(1, max/Math.max(img.width,img.height));
      const cv=document.createElement('canvas');
      cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      pendingPhotoTarget.photo = cv.toDataURL('image/jpeg',0.85);
      persist(); render(); toast('사진이 교체되었습니다');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

/* ---------- Add instructor ---------- */
function addInstructor(){
  const ins = { id:uid(), name:'', role:'', photo:'', tags:[], tagline:'Stories Change the World.',
    greeting:'', career:[{period:"'YY.MM – 현재", role:''}], lectures:[''] };
  state.data.instructors.push(ins);
  state.selectedId = ins.id;
  persist(); render();
  document.getElementById('detail').scrollIntoView({behavior:'smooth',block:'start'});
  toast('강사가 추가되었습니다 — 내용을 입력하세요');
}

/* ---------- Edit meta (hero) ---------- */
function bindHeroEdit(){
  ['heroEyebrow','heroTitle','heroDesc'].forEach(k=>{
    const el = document.getElementById(k);
    if(state.editing){
      el.setAttribute('contenteditable','true');
      el.oninput = ()=>{ state.data.meta[k] = el.innerText; persist(); };
    }else{
      el.removeAttribute('contenteditable'); el.oninput=null;
    }
  });
}

/* ---------- Master render ---------- */
function render(){
  document.body.classList.toggle('edit', state.editing);
  renderHero();
  bindHeroEdit();
  renderRoster();
  renderDetail();
}

/* ---------- Edit mode toggle / password ---------- */
const pwModal = document.getElementById('pwModal');
const pwInput = document.getElementById('pwInput');
const pwErr = document.getElementById('pwErr');

document.getElementById('editToggle').addEventListener('click', ()=>{
  pwErr.textContent=''; pwInput.value=''; pwModal.classList.add('show'); setTimeout(()=>pwInput.focus(),50);
});
document.getElementById('pwCancel').addEventListener('click', ()=>pwModal.classList.remove('show'));
pwModal.addEventListener('click', e=>{ if(e.target===pwModal) pwModal.classList.remove('show'); });
function tryUnlock(){
  if(pwInput.value===PASSWORD){
    pwModal.classList.remove('show'); enterEdit();
  }else{ pwErr.textContent='비밀번호가 올바르지 않습니다'; pwInput.value=''; pwInput.focus(); }
}
document.getElementById('pwOk').addEventListener('click', tryUnlock);
pwInput.addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });

function enterEdit(){
  state.editing = true;
  document.getElementById('editToggle').style.display='none';
  document.getElementById('exportJson').style.display='';
  document.getElementById('exportHtml').style.display='';
  document.getElementById('exitEdit').style.display='';
  render(); toast('수정 모드 — 변경 사항은 자동 저장됩니다');
}
document.getElementById('exitEdit').addEventListener('click', ()=>{
  state.editing = false;
  document.getElementById('editToggle').style.display='';
  document.getElementById('exportJson').style.display='none';
  document.getElementById('exportHtml').style.display='none';
  document.getElementById('exitEdit').style.display='none';
  persist(); render(); toast('저장되었습니다');
});

/* ---------- Export ---------- */
function download(name, text, type){
  const blob = new Blob([text], {type:type||'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
document.getElementById('exportJson').addEventListener('click', ()=>{
  download('tooning-instructors.json', JSON.stringify(state.data,null,2), 'application/json');
  toast('데이터(JSON)를 백업했습니다');
});
document.getElementById('exportHtml').addEventListener('click', async ()=>{
  try{
    const res = await fetch(location.href);
    let html = await res.text();
    const s = html.indexOf('/*__DATA_START__*/');
    const e = html.indexOf('/*__DATA_END__*/');
    if(s===-1||e===-1) throw new Error('marker');
    const newBlock = '/*__DATA_START__*/\nconst DEFAULT_DATA = '+JSON.stringify(state.data,null,2)+';\n';
    html = html.slice(0,s) + newBlock + html.slice(e);
    download('index.html', html, 'text/html');
    toast('현재 내용이 반영된 index.html을 받았습니다 — GitHub에 커밋하세요');
  }catch(err){
    toast('HTML 내보내기는 배포된 사이트(Vercel)에서 동작합니다');
  }
});

/* ---------- Toast ---------- */
let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}

/* ---------- Apply form ---------- */
const APPLY_EMAIL = 'brhoyoung2@gmail.com'; // 신청서 수신 이메일 — 변경하려면 이 값을 수정
(function(){
  const form = document.getElementById('applyForm');
  if(!form) return;
  form.addEventListener('submit', e=>{
    e.preventDefault();
    if(!form.checkValidity()){ form.reportValidity(); return; }
    const v = n => (form.elements[n].value || '').trim();
    const subject = `[교원연수 신청] ${v('school')} · ${v('name')}`;
    const body =
      `■ 신청자 성함: ${v('name')}\n`+
      `■ 학교명: ${v('school')}\n`+
      `■ 연락처: ${v('phone')}\n`+
      `■ 이메일: ${v('email')}\n`+
      `■ 교원연수 일정·시간: ${v('schedule')}\n`+
      `■ 연수 받을 선생님 수: ${v('count')}명\n`;

const headerEl = document.querySelector('header.bar');
function syncHeader(){
  headerEl.classList.toggle('solid', window.scrollY > window.innerHeight * 0.72);
}
window.addEventListener('scroll', syncHeader, {passive:true});
window.addEventListener('resize', syncHeader, {passive:true});

/* ---------- Hero video: respect reduced-motion ---------- */
(function(){
  const v = document.getElementById('heroVideo');
  if(!v) return;
  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches){
    v.removeAttribute('autoplay'); v.pause();
  }
})();

document.getElementById('yr').textContent = new Date().getFullYear();
render();
syncHeader();
